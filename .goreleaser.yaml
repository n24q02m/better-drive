version: 2

release:
  replace_existing_artifacts: true
  # Mark -beta/-rc tags as GitHub pre-releases so they don't take the "Latest" slot.
  prerelease: auto

builds:
  - id: better-drive
    main: .
    binary: better-drive
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/n24q02m/better-drive/internal/version.Version={{.Version}}
      - -X github.com/n24q02m/better-drive/internal/version.Commit={{.Commit}}
      - -X github.com/n24q02m/better-drive/internal/version.Date={{.Date}}
    # Windows tray needs the GUI subsystem (no console window on launch).
    # goreleaser requires both goos AND goarch set on each override entry for
    # it to match anything, so windows/amd64 and windows/arm64 need one each;
    # linux/darwin keep the base ldflags above (no -H windowsgui).
    overrides:
      - goos: windows
        goarch: amd64
        ldflags:
          - -s -w
          - -H windowsgui
          - -X github.com/n24q02m/better-drive/internal/version.Version={{.Version}}
          - -X github.com/n24q02m/better-drive/internal/version.Commit={{.Commit}}
          - -X github.com/n24q02m/better-drive/internal/version.Date={{.Date}}
      - goos: windows
        goarch: arm64
        ldflags:
          - -s -w
          - -H windowsgui
          - -X github.com/n24q02m/better-drive/internal/version.Version={{.Version}}
          - -X github.com/n24q02m/better-drive/internal/version.Commit={{.Commit}}
          - -X github.com/n24q02m/better-drive/internal/version.Date={{.Date}}

archives:
  - id: default
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "better-drive_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

brews:
  - repository:
      owner: n24q02m
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/n24q02m/better-drive"
    description: "2-way Google Drive sync with .driveignore filter (rclone engine, Windows tray)"
    license: "MIT"
    dependencies:
      - name: rclone
    install: |
      bin.install "better-drive"
    test: |
      assert_match "better-drive version", shell_output("#{bin}/better-drive --version")
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "feat: bump better-drive to {{ .Tag }}"

scoops:
  - repository:
      owner: n24q02m
      name: scoop-bucket
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/n24q02m/better-drive"
    description: "2-way Google Drive sync with .driveignore filter (rclone engine, Windows tray)"
    license: MIT
    depends:
      - rclone
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    commit_msg_template: "feat: bump better-drive to {{ .Tag }}"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - "^Merge"
