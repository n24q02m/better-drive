name: CD

# CD handles:
#  - Release on workflow_dispatch (semantic-release -> tag -> goreleaser -> publish)
#  - Tag push -> goreleaser publish (still works for manual `git tag v*` && `git push --tags` flow)
#
# Repo Secrets required:
#   GITHUB_TOKEN         - built-in
#   CI_APP_KEY           - n24q02m-ci GitHub App private key
#   TAP_GITHUB_TOKEN     - fine-grained PAT with contents:write on n24q02m/scoop-bucket
#
# Repo Variables required:
#   CI_APP_ID            - n24q02m-ci GitHub App ID (3200052)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ==================== Release (workflow_dispatch) ====================
  release:
    name: Semantic Release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - id: release
        uses: n24q02m/better-semantic-release@95d056deb7b7edcf6b4be69536aec70624355333 # v1.2.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.event.inputs.release_type == 'beta' }}
          prerelease_token: beta
      - if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@5a5718ce47b892ef699f2972dae122297771d641 # v10.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

  # ==================== Goreleaser ====================
  # Triggered by:
  #  - tag push (git tag v* && git push --tags)
  #  - semantic-release output (workflow_dispatch flow above)
  goreleaser:
    name: Build and Publish Binaries
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && needs.release.outputs.released == 'true')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag || github.ref }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin goreleaser to the exact tag semantic-release produced.
          # Without this, git-describe is ambiguous when a stable tag and
          # a prerelease tag (e.g. v1.5.1 + v1.5.1-beta.1) point at the same
          # commit, and goreleaser may pick the wrong one (duplicate-asset 422).
          GORELEASER_CURRENT_TAG: ${{ needs.release.outputs.tag }}
          # Fine-grained PAT with `contents:write` on
          # n24q02m/scoop-bucket. Goreleaser uses this to push
          # manifest updates on release.
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
