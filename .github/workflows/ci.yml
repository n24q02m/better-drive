name: CI

on:
  push:
    branches: [main, feat/v1]
  pull_request:
    branches: [main, feat/v1]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - run: go build ./...
      - run: go test ./...

  codeql:
    # NOTE: CodeQL requires the repository to be public or have GitHub Advanced Security enabled.
    # For private repositories without GHAS, remove this job or skip it.
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - uses: github/codeql-action/analyze@v3
